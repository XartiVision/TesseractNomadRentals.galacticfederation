<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TesseractNomadRentals.galacticfederation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
        
        :root {
            --space-black: #0a0a1f;
        }
        
        body {
            font-family: 'VT323', monospace;
        }
        
        .retro-title {
            font-family: 'Press Start 2P', system-ui;
        }

        .star-bg {
            background-image: 
                radial-gradient(circle at 25% 30%, rgba(255,255,255,0.9) 1px, transparent 0),
                radial-gradient(circle at 75% 60%, rgba(255,255,255,0.8) 1px, transparent 0),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.7) 2px, transparent 0),
                radial-gradient(circle at 80% 40%, rgba(255,255,255,0.9) 1px, transparent 0);
            background-size: 400px 400px;
            animation: stars 25s linear infinite;
        }

        @keyframes stars {
            0% { background-position: 0 0; }
            100% { background-position: -400px -400px; }
        }

        .neon-text {
            text-shadow: 
                0 0 5px #22ffcc,
                0 0 10px #22ffcc,
                0 0 20px #ff22cc;
        }

        .listing-card {
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .listing-card:hover {
            transform: translateY(-15px) rotate(2deg);
            box-shadow: 0 0 30px rgba(34, 255, 204, 0.5);
        }

        .portal {
            animation: portalPulse 4s ease-in-out infinite;
        }

        @keyframes portalPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 34, 204, 0.4); }
            50% { box-shadow: 0 0 0 25px rgba(255, 34, 204, 0); }
        }
    </style>
</head>

                </div>
                <button onclick="showRandomPortal()"

                    OPEN PORTAL
                </button>
            </div>
        </div>
    </nav>
